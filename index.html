<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFKit: Free Online PDF Merger, Form Filler & Signer</title>
    <meta name="description" content="Secure, client-side PDF tools. Merge files, convert flat documents to fillable forms, extract pages, and sign PDFs locally in your browser. No server uploads.">
    <meta name="keywords" content="online pdf editor, merge pdf, fillable pdf form generator, sign pdf online, local pdf tools, privacy-focused pdf manager">
    <link rel="canonical" href="https://haisumapku2008-prog.github.io/PDFKit/" />
    
    <meta property="og:title" content="PDFKit - Professional Local PDF Sandbox">
    <meta property="og:description" content="Private, browser-based PDF management: merge, fill, split, and sign.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://haisumapku2008-prog.github.io/PDFKit/">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; color: #0f172a; padding: 2rem 1rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        header { margin-bottom: 2rem; text-align: center; max-width: 800px; }
        header h1 { font-size: 2.25rem; font-weight: 800; letter-spacing: -0.025em; color: #1e293b; }
        header p { color: #64748b; margin-top: 0.5rem; }
        .privacy-badge { display: inline-block; background: #dcfce7; color: #15803d; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 20px; margin-top: 0.5rem; text-transform: uppercase; }
        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .container { grid-template-columns: 1fr 2.5fr; } }
        .card { background: #ffffff; padding: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: fit-content; }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #0f172a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .menu-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .menu-btn { background: #f8fafc; border: 1px solid #e2e8f0; text-align: left; padding: 0.75rem 1rem; border-radius: 8px; font-weight: 600; color: #475569; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
        .menu-btn:hover, .menu-btn.active { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
        .workspace-panel { display: none; }
        .workspace-panel.active { display: block; }
        .file-dropzone { border: 2px dashed #cbd5e1; background: #f8fafc; padding: 2rem 1rem; text-align: center; border-radius: 8px; cursor: pointer; transition: border-color 0.2s; margin-bottom: 1rem; position: relative; }
        .file-dropzone:hover { border-color: #2563eb; }
        .file-dropzone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .btn-action { background: #2563eb; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 0.5rem; transition: background 0.2s; margin-top: 1rem; }
        .btn-action:hover { background: #1d4ed8; }
        .btn-action:disabled { background: #cbd5e1; cursor: not-allowed; }
        .file-badge-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .file-badge { background: #f1f5f9; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; color: #334155; border: 1px solid #e2e8f0; cursor: grab; }
        .btn-delete-node { background: #fee2e2; color: #ef4444; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 0.75rem; margin-left: 0.5rem; }
        .pdf-interactive-render-container { position: relative; border: 1px solid #cbd5e1; background: #64748b; border-radius: 8px; padding: 1rem; max-height: 600px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; margin-top: 1rem; }
        .page-wrapper { position: relative; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 0.5rem; }
        .generated-form-input { position: absolute; border: 1px solid rgba(37, 99, 235, 0.3); background-color: rgba(219, 234, 254, 0.45); color: #0f172a; font-size: 11px; padding: 2px; box-sizing: border-box; border-radius: 2px; pointer-events: auto; }
        .signature-box { border: 1px solid #cbd5e1; background: white; border-radius: 8px; margin-bottom: 1rem; position: relative; width: 100%; height: 200px; touch-action: none; }
        canvas.sig-canvas-layer { width: 100%; height: 100%; display: block; border-radius: 8px; cursor: crosshair; }
        .status-msg { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; display: none; font-weight: 500; }
        .status-success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-working { display: block; background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .range-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
        .range-group input { padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; }
    </style>
</head>
<body>
    </body>
</html>
